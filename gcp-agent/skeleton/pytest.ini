[pytest]
# Pytest configuration for GCP Agent tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    # Coverage disabled by default - use --cov=src to enable
    # --cov=src
    # --cov-report=html
    # --cov-report=term-missing
    # --cov-report=xml
    --cov-branch
    --maxfail=5

# Coverage options
[coverage:run]
source = src
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */site-packages/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

# Markers for test categorization
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow-running tests
    requires_gcp: Tests that require GCP credentials
    requires_secrets: Tests that require Secret Manager access
