steps:
  # Install dependencies
  - name: 'python:3.12'
    entrypoint: 'bash'
    dir: 'src'
    args:
      - '-c'
      - |
        set -euo pipefail

        pip install uv
        uv run data_create.py create_agent
    env:
      - 'DATA_APP_API_URL=${_DATA_APP_API_URL}'
      - 'CLOUDRUN_SERVICE_URL=${_CLOUDRUN_SERVICE_URL}'
  # Run the main agent application
  - name: 'python:3.12'
    entrypoint: 'bash'
    dir: 'src'
    args:
      - '-c'
      - |
        set -euo pipefail
        
        pip install uv
        uv run agent_engine_deploy.py
    env:
      - 'SERVICE_ACCOUNT_NAME=${_AGENT_EXEC_SERVICE_ACCOUNT_NAME}'
# Update database with agent completion status using values from agent.py
  - name: 'python:3.12'
    id: 'update-agent-in-db'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        
        pip install uv
        # Extract values from the JSON file created by agent.py
        AGENT_BASE_ID=$$(python -c "import json; data=json.load(open('/workspace/agent_output.json')); print(data['agent_base_id'])")
        AGENT_ALIAS_ID=$$(python -c "import json; data=json.load(open('/workspace/agent_output.json')); print(data['agent_alias_id'])")
        AGENT_URL=$$(python -c "import json; data=json.load(open('/workspace/agent_output.json')); print(data['agent_url'])")
        AGENT_ID=$$(python -c "import json; data=json.load(open('/workspace/agent_data_create.json')); print(data['agent_id'])")
        echo "Using agent_base_id: $$AGENT_BASE_ID"
        echo "Using agent_alias_id: $$AGENT_ALIAS_ID"
        echo "Using agent_url: $$AGENT_URL"
        echo "Using agent_id: $$AGENT_ID"
        # Run data_update.py with the extracted values
        uv run src/data_update.py update_agent "$$AGENT_BASE_ID" "$$AGENT_ALIAS_ID" "$$AGENT_URL" "Ready"
    env:
      - 'DATA_APP_API_URL=${_DATA_APP_API_URL}'
      - 'CLOUDRUN_SERVICE_URL=${_CLOUDRUN_SERVICE_URL}'
  - name: 'python:3.12'
    id: 'deepeval'
    entrypoint: 'bash'
    dir: 'evaluation'
    args:
      - '-c'
      - |         
        set -euo pipefail
        
        pip install uv
        # Extract values from the JSON file created by agent.py
        AGENT_ID=$$(python -c "import json; data=json.load(open('/workspace/agent_data_create.json')); print(data['agent_id'])")
        GENERAL_RUN_ID=$$(python -c "import json; data=json.load(open('/workspace/agent_data_create.json')); print(data['general_run_id'])")
        AGENT_BASE_ID=$$(python -c "import json; data=json.load(open('/workspace/agent_output.json')); print(data['agent_base_id'])")
        AGENT_ALIAS_ID=$$(python -c "import json; data=json.load(open('/workspace/agent_output.json')); print(data['agent_alias_id'])")
        GENERAL_GROUNDTRUTH_GCS_PATH=$$(python -c "import json; data=json.load(open('/workspace/groundtruth_output.json')); print(data['general_groundtruth_gcs_path'])")
        uv run deepeval_evaluation/main.py "$$AGENT_ID" "$$AGENT_ALIAS_ID" "$$GENERAL_GROUNDTRUTH_GCS_PATH" "$LOCATION" "$$GENERAL_RUN_ID"
    env:
      - 'DATA_API_BASEURL=${_DATA_APP_API_URL}'
      - 'CLOUDRUN_SERVICE_URL=${_CLOUDRUN_SERVICE_URL}'
  - name: 'python:3.12'
    id: 'ragas'
    entrypoint: 'bash'
    dir: 'evaluation'
    args:
      - '-c'
      - |
        set -euo pipefail
        
        pip install uv
        # Extract values from the JSON file created by agent.py
        AGENT_ID=$$(python -c "import json; data=json.load(open('/workspace/agent_data_create.json')); print(data['agent_id'])")
        RAG_RUN_ID=$$(python -c "import json; data=json.load(open('/workspace/agent_data_create.json')); print(data['rag_run_id'])")
        AGENT_BASE_ID=$$(python -c "import json; data=json.load(open('/workspace/agent_output.json')); print(data['agent_base_id'])")
        AGENT_ALIAS_ID=$$(python -c "import json; data=json.load(open('/workspace/agent_output.json')); print(data['agent_alias_id'])")
        RAG_GROUNDTRUTH_GCS_PATH=$$(python -c "import json; data=json.load(open('/workspace/groundtruth_output.json')); print(data['rag_groundtruth_gcs_path'])")
        uv run ragas_program/main.py "$$AGENT_ID" "$$AGENT_ALIAS_ID" "$$RAG_GROUNDTRUTH_GCS_PATH" "$LOCATION" "$$RAG_RUN_ID"
    env:
      - 'DATA_API_BASEURL=${_DATA_APP_API_URL}'
      - 'CLOUDRUN_SERVICE_URL=${_CLOUDRUN_SERVICE_URL}'

  # Fetch Arize secrets from Secret Manager via gcloud
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'fetch-arize-secrets'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail

        echo "Fetching Arize secrets from Secret Manager via gcloud..."
        echo "Using PROJECT_ID: ${PROJECT_ID}, LOCATION: ${LOCATION}"

        # Read secret names from configuration.json
        ARIZE_API_KEY_NAME=$$(python3 -c "import json; data=json.load(open('/workspace/config/configuration.json')); print(data['ARIZE_API_KEY_NAME'])")
        ARIZE_SPACE_ID_NAME=$$(python3 -c "import json; data=json.load(open('/workspace/config/configuration.json')); print(data['ARIZE_SPACE_ID_NAME'])")
        ARIZE_VERTEXAI_INTEGRATION_ID_NAME=$$(python3 -c "import json; data=json.load(open('/workspace/config/configuration.json')); print(data['ARIZE_VERTEXAI_INTEGRATION_ID_NAME'])")

        echo "Secret names from config: API_KEY=$$ARIZE_API_KEY_NAME, SPACE_ID=$$ARIZE_SPACE_ID_NAME, VERTEXAI_INTEGRATION_ID=$$ARIZE_VERTEXAI_INTEGRATION_ID_NAME"

        # Fetch latest secret versions and write to workspace files
        gcloud secrets versions access latest --secret="$$ARIZE_API_KEY_NAME" --project=${PROJECT_ID} > /workspace/arize_api_key.txt
        gcloud secrets versions access latest --secret="$$ARIZE_SPACE_ID_NAME" --project=${PROJECT_ID} > /workspace/arize_space_id.txt
        gcloud secrets versions access latest --secret="$$ARIZE_VERTEXAI_INTEGRATION_ID_NAME" --project=${PROJECT_ID} > /workspace/arize_vertexai_integration_id.txt

        echo "✅ Arize secrets fetched successfully and written to /workspace"
    env:
      - 'CLOUDRUN_SERVICE_URL=${_CLOUDRUN_SERVICE_URL}'

  - name: 'python:3.12'
    id: 'arize'
    dir: 'evaluation'
    env:
      - 'DATA_API_BASEURL=${_DATA_APP_API_URL}'
      - 'CLOUDRUN_SERVICE_URL=${_CLOUDRUN_SERVICE_URL}'
      
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        
        pip install uv
        # Load Arize secrets into environment variables
        export ARIZE_API_KEY=$$(cat /workspace/arize_api_key.txt)
        export ARIZE_SPACE_ID=$$(cat /workspace/arize_space_id.txt)
        export ARIZE_VERTEXAI_INTEGRATION_ID=$$(cat /workspace/arize_vertexai_integration_id.txt)
        # Extract values from the JSON file created by agent.py
        AGENT_BASE_ID=$$(python -c "import json; data=json.load(open('/workspace/agent_output.json')); print(data['agent_base_id'])")
        AGENT_ALIAS_ID=$$(python -c "import json; data=json.load(open('/workspace/agent_output.json')); print(data['agent_alias_id'])")
        AGENT_NAME=$$(python -c "import json; data=json.load(open('/workspace/agent_output.json')); print(data['agent_name'])")
        AGENT_MODEL=$$(python -c "import json; data=json.load(open('/workspace/agent_output.json')); print(data['model'])")
        AGENT_VERSION_TAG=$$(python -c "import json; data=json.load(open('/workspace/agent_data_create.json')); print(data['agent_version_tag'])")
        uv run arize_setup/main.py "$$AGENT_NAME" "$$AGENT_MODEL" "$$AGENT_BASE_ID" "$$AGENT_ALIAS_ID" "$$AGENT_VERSION_TAG"

substitutions:
  _AGENT_EXEC_SERVICE_ACCOUNT_NAME: ''
  _DATA_APP_API_URL: ''
  _CLOUDRUN_SERVICE_URL: ''
  _WORKER_POOL_NAME: ''
options:
  logging: CLOUD_LOGGING_ONLY
  pool:
    name: ${_WORKER_POOL_NAME}