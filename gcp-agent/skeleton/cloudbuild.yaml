steps:
  # Copy agents-config.json to src/config so the generator can find it.
  # _AGENT_FOLDER is required because Cloud Build always runs from the repo
  # root (/workspace/), but the agent lives in a subfolder of aura-generated-agents.
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail

        cp ${_AGENT_FOLDER}/config/agents-config.json ${_AGENT_FOLDER}/src/config/

  # Convert agents-config.json → agent-config.yaml  +  root-agent.yaml / sub_agents/*.yaml
  - name: 'python:3.12'
    entrypoint: 'bash'
    dir: '${_AGENT_FOLDER}/src/config'
    env:
      - 'PYTHONPATH=/workspace/${_AGENT_FOLDER}/src'
    args:
      - '-c'
      - |
        set -euo pipefail

        pip install uv
        uv run --no-project --with pyyaml agent_config_generator.py

  # Deploy the agent to Vertex AI Agent Engine
  - name: 'python:3.12'
    entrypoint: 'bash'
    dir: '${_AGENT_FOLDER}/src'
    args:
      - '-c'
      - |
        set -euo pipefail

        pip install uv
        uv run agent_engine_deploy.py
    env:
      - 'SERVICE_ACCOUNT_NAME=${_AGENT_EXEC_SERVICE_ACCOUNT_NAME}'
      - 'PROJECT_ID=${PROJECT_ID}'
      - 'LOCATION=${LOCATION}'
      - 'STAGING_BUCKET_NAME=${_STAGING_BUCKET_NAME}'
      - 'PYTHONPATH=/workspace/${_AGENT_FOLDER}/src'

substitutions:
  _AGENT_FOLDER: ''                       # set per-trigger to the agent's subfolder name (e.g. weather-travel-assistant)
  _AGENT_EXEC_SERVICE_ACCOUNT_NAME: ''
  _STAGING_BUCKET_NAME: ''
  _WORKER_POOL_NAME: ''

options:
  logging: CLOUD_LOGGING_ONLY
  pool:
    name: ${_WORKER_POOL_NAME}
