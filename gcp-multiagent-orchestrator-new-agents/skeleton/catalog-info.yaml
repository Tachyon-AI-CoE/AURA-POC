apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ values.root_agent_display_name }}
  description: Created with ${{ values.template_name }} Template. ${{ values.root_agent_description }}
  tags:
    - gcp
    - multiagent
    - orchestrator
  annotations:
    backstage.io/techdocs-ref: dir:.
spec:
  type: agent
  owner: ${{ values.owner }}
  lifecycle: ${{ values.lifecycle }}
  providesApis:
    - api:${{ values.root_agent_display_name }}-api

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: ${{ values.root_agent_display_name }}-api
  description: "OpenAPI definition for ${{ values.root_agent_display_name }} orchestrator agent"
  tags:
    - gcp
    - multiagent
    - orchestrator
spec:
  type: openapi
  owner: ${{ values.owner }}
  lifecycle: ${{ values.lifecycle }}
  definition:
    $text: ./docs/openapi.json
{%- if values.agents and values.agents | length > 0 %}
{%- for agent in values.agents %}
{%- if agent.name %}

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ agent.name }}
  description: "${{ 'Agent: ' + (agent.description | default('Agent component')) }}"
  tags:
    - gcp
    - multiagent
    - orchestrator
    - agent
  annotations:
    backstage.io/techdocs-ref: dir:.
spec:
  type: agent
  owner: ${{ values.owner }}
  lifecycle: ${{ values.lifecycle }}
  dependsOn:
    - component:${{ values.root_agent_display_name }}
{%- endif %}
{%- endfor %}
{%- endif %}