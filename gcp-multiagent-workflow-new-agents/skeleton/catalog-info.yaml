apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ values.root_agent_display_name }}
  description: "Created with ${{ values.template_name }} Template. ${{ values.root_agent_description }}"
  tags:
    - gcp
    - multiagent
    - workflow
  annotations:
    backstage.io/techdocs-ref: dir:.
spec:
  type: agent
  owner: ${{ values.owner }}
  lifecycle: ${{ values.lifecycle }}
  providesApis: 
    - api:${{ values.root_agent_display_name }}-api
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: ${{ values.root_agent_display_name }}-api
  description: "OpenAPI definition for ${{ values.root_agent_display_name }} workflow orchestrator agent."
  tags:
    - gcp
    - multiagent
    - workflow
spec:
  type: openapi
  owner: ${{ values.owner }}
  lifecycle: ${{ values.lifecycle }}
  definition:
    $text: ./docs/openapi.json
{%- if values.agents and values.agents | length > 0 %}
{%- for agent in values.agents | default([]) %}
{%- if agent.name %}
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ agent.name }}
  description: "${{ 'Agent: ' + (agent.description | default('Agent component')) }}"
  tags:
    - gcp
    - multiagent
    - workflow
    - main-agent
  annotations:
    backstage.io/techdocs-ref: dir:.
spec:
  type: agent
  owner: ${{ values.owner }}
  lifecycle: ${{ values.lifecycle }}
  dependsOn:
    - component:${{ values.root_agent_display_name }}
{%- for sub_agent in agent.sub_agents | default([]) %}
{%- if sub_agent.name %}
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ sub_agent.name }}
  description: "Sub-agent: ${{ sub_agent.description | default('Sub-agent component') }}"
  tags:
    - gcp
    - multiagent
    - workflow
    - sub-agent
  annotations:
    backstage.io/techdocs-ref: dir:.
spec:
  type: agent
  owner: ${{ values.owner }}
  lifecycle: ${{ values.lifecycle }}
  dependsOn:
    - component:${{ agent.name }}
{%- endif %}
{%- endfor %}
{%- endif %}
{%- endfor %}
{%- endif %}