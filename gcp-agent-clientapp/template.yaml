apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: gcp-vertexai-agent-client
  title: GCP - Vertex AI Client
  description: "Template for creating GCP - Vertex AI Client"
  tags:
    - gcp
spec:
  type: gcp-agent-client
  owner: group:catalog-admin
  parameters:
    - title: Basic Info
      required:
        - owner
        - description
        - name
        - region
        - agent_id
      properties:
        name:
          title: Client App Name
          type: string
          description: Provide the Client app name
          pattern: "^[a-z]([a-z0-9_-]*[a-z0-9])?$"

        description:
          title: Description
          type: string
          description: Provide the Description
          maxLength: 200
        agent_id:
          title: Vertexai Agent ID
          type: string
          description: Provide Agent ID which is a numeric value.
          pattern: "^[0-9]*$"
        region:
          title: Region
          type: object
          ui:field: custom_dropdown
          description: Select the Region
          apiPath: /api/ai-components/regions/
          attrKey: regionname
          disableIfValueExistsFor: name
        owner:
          title: Owner
          type: string
          description: Owner of the component
          ui:field: OwnerPicker
          ui:options:
            allowedKinds:
            - Group

        lifecycle:
          title: Lifecycle
          type: string
          description: Provide the Lifecycle
          enum:
            - development
            - staging
            - production
          default: development
      errorMessage:
        properties:
          name: "should start with a lowercase letter and can contain lowercase letters, numbers, underscores, or hyphens; and end with a lowercase letter or number"
          agent_id: "should contain only numbers"
    - title: Repository Details
      required:
        - repo_url
        - collaborators
      properties:
        repo_url:
          title: Repository Location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
            - github.com
          # Enforce repo name length <= 56 (RepoUrlPicker value format: "github.com?owner=<org>&repo=<name>")
          pattern: "^github\\.com\\?owner=[^&]+&repo=[A-Za-z][A-Za-z0-9_-]{0,54}[A-Za-z0-9]$"
          errorMessage:
            pattern: "Repository name should start with a letter and end with an alphanumeric and can be at most 56 characters."
            
        default_branch:
          title: Default Branch
          type: string
          description: Provide the default branch name
          default: "main"
        protectDefaultBranch:
          title: Protect Default Branch
          type: boolean
          description: Whether to protect the default branch
          default: false
        collaborators:
          title: GitHub Team Collaborators
          type: array
          description: Name of the GitHub team to add as collaborators and the corresponding access level
          items:
            type: object
            properties:
              team:
                type: string
                title: Team Name
                description: Name of the Team in Github
              access:
                type: string
                title: Access Level
                description: Access level for the Team
                default: push
                enum:
                  - pull
                  - push
                  - admin
                  - maintain
                  - triage
          required:
            - team
            - access
         
  steps:
    - id: template
      name: Fetch Skeleton + Template
      action: fetch:template
      input:
        url: ./skeleton
        values:
          agent_id: ${{ parameters.agent_id }}
          owner: ${{ parameters.owner }}
          lifecycle: ${{ parameters.lifecycle }}
          template_name: "gcp-agent-clientapp"
          region: ${{ parameters.region.value }}
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          project_id: ${{ scaffolder_globals.gcp_project_id }}
          project_number: ${{ scaffolder_globals.gcp_project_number }}
    - id: publish
      name: Publish
      action: publish:github
      input:
        description: This is ${{ parameters.name }} repository. Created with vertexai-agent-client app template.
        repoUrl: ${{ parameters.repo_url }}
        defaultBranch: "${{ parameters.default_branch }}"
        collaborators: ${{ parameters.collaborators }}
        protectDefaultBranch: ${{ parameters.protectDefaultBranch }}
    - id: apply-trigger
      name: Create GCP CloudBuild Trigger
      action: gcp:cloudbuild:create
      input:
        branchName: main
        githubRepositoryName: ${{ (parameters.repo_url | parseRepoUrl).repo }}
        githubRepositoryOwner: ${{ (parameters.repo_url | parseRepoUrl).owner }}
        triggerName: ${{ (parameters.repo_url | parseRepoUrl).repo | replace('_', '-') }}-trigger
    - id: register
      name: Register
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: "/catalog-info.yaml"

  output:
    links:
      - title: Repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
